title: Elastic Database Monitoring (Serverless)
teaser: Six DB platforms in Kibana via OTel—stacked vs Datadog DBM and Dynatrace,
  no proprietary agents.
description: |
  **Goal:** Demonstrate Elastic Observability Serverless as a superior alternative to
  **Datadog Database Monitoring (DBM)** and **Dynatrace** for customers running
  **MySQL, PostgreSQL, Microsoft SQL Server, MongoDB, IBM Db2, and Oracle**.

  The track automatically generates **realistic telemetry** for all six database
  platforms via **OpenTelemetry OTLP** — slow queries, connections, lock waits, deadlocks,
  replication lag, buffer cache hit ratios, Db2 buffer pool and log utilisation, Oracle tablespace utilisation, and more —
  and deploys a dedicated **Kibana dashboard** for each platform.

  **Key differentiators vs Datadog / Dynatrace:**
  - **No proprietary agents** — standard OpenTelemetry receivers
  - **SQL Server at no extra cost** (Datadog DBM charges a premium add-on)
  - **MongoDB, Db2, and Oracle** are first-class (limited or paid add-ons in competitors)
  - **Unlimited custom dashboards** via Lens + ES|QL
  - **AI-assisted dashboard building** with Cursor + Elastic Agent Skills in under 2 minutes
  - **Cross-project search** — link a Serverless Security project to enrich Observability cases with security context
  - **Open standards** — no vendor lock-in, data sovereignty

  The sandbox is a single **elastic/es3-api-v2** host that creates a fresh Observability
  Serverless project per play, proxies **Kibana** on port **8080**, and runs the Python
  OTLP generator in the background throughout the session.
