version: "1"
name: Database Monitoring — AI recommendations 📝
description: |
  Every **10 minutes** (and on manual run), calls the default Elastic AI agent (Agent Builder) once per
  database engine (MySQL, PostgreSQL, SQL Server, MongoDB, Db2, Oracle) with an
  engine-specific improvement prompt, then indexes each markdown answer into
  **db-monitoring-recommendations** with **database_platform** set so the matching
  Kibana dashboard shows the latest text for that engine only.

  Legacy documents without **database_platform** still appear on the **Db2** dashboard.

  After indexing, each run **updates the matching library Markdown saved object** (``dbmon-ai-rec-*``)
  so database dashboards show fresh formatted text **without** re-running ``import_dashboards.py``.
enabled: true
tags:
  - database-monitoring
  - mysql
  - postgresql
  - sqlserver
  - mongodb
  - db2
  - oracle
  - ai
  - DEMO
triggers:
  - type: scheduled
    with:
      every: "10m"
  - type: manual

steps:
  - name: workflow-start
    type: console
    with:
      message: |
        AI recommendations workflow started (execution {{ execution.id }}).
        Six engine-specific recommendations will be generated and indexed.

  - name: agent_mysql
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer monitors **MySQL**
          in Elastic Observability via OpenTelemetry. Relevant data streams include
          **logs-mysql.slowlog.otel.otel-default** (slow queries: mysql.slowlog.query_time,
          lock_time, db.name, db.sql.table) and **logs-mysql.error.otel.otel-default**
          (log.level, error patterns).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to tune or watch first on a MySQL health / slow-query dashboard (3–5 bullets).
          2. Thresholds or patterns tied to slow queries, lock time, and errors.
          3. When to escalate (e.g. sustained slow queries, error spikes).
          4. One short paragraph on OTel + Elastic vs agent-only DBM for MySQL.

          Keep advice generic; do not invent customer host names.

  - name: index_mysql
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: mysql
        recommendation: "{{ steps.agent_mysql.output.response.message }}"

  - name: agent_postgresql
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer monitors **PostgreSQL**
          in Elastic Observability. Synthetic metrics land in
          **metrics-postgresqlreceiver.otel.otel-default** (postgresql.backends,
          postgresql.deadlocks, postgresql.db_size, postgresql.tup_* , postgresql.database.name).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to watch first on a PostgreSQL capacity / health dashboard (3–5 bullets).
          2. Early warning patterns (connections, deadlocks, growth).
          3. When to escalate.
          4. One short paragraph on OpenTelemetry metrics + Elastic vs JDBC-only monitoring.

          Keep advice generic; do not invent customer host names.

  - name: index_postgresql
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: postgresql
        recommendation: "{{ steps.agent_postgresql.output.response.message }}"

  - name: agent_sqlserver
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer monitors **Microsoft SQL Server**
          in Elastic Observability. Metrics land in **metrics-sqlserverreceiver.otel.otel-default**
          (sqlserver.user.connection.count, sqlserver.lock.wait_time.avg,
          sqlserver.page.buffer_cache.hit_ratio, sqlserver.database.io.*, sqlserver.deadlock.count,
          batch_sql_request.count).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to watch first on a SQL Server performance dashboard (3–5 bullets).
          2. Patterns for memory pressure, lock waits, and I/O latency.
          3. When to escalate.
          4. One short paragraph on OTel + Elastic vs proprietary SQL Server-only agents.

          Keep advice generic; do not invent customer host names.

  - name: index_sqlserver
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: sqlserver
        recommendation: "{{ steps.agent_sqlserver.output.response.message }}"

  - name: agent_mongodb
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer monitors **MongoDB**
          in Elastic Observability. Metrics land in **metrics-mongodbatlas.otel.otel-default**
          (mongodb.connection.count, mongodb.memory.*, mongodb.operation.*,
          mongodb.replication.lag, mongodb.document.operation.count).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to watch first on a MongoDB operations / health dashboard (3–5 bullets).
          2. Patterns for memory, replication lag, and operation mix.
          3. When to escalate.
          4. One short paragraph on OTel + Elastic vs Atlas-only tooling.

          Keep advice generic; do not invent customer host names.

  - name: index_mongodb
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: mongodb
        recommendation: "{{ steps.agent_mongodb.output.response.message }}"

  - name: agent_db2
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer runs **IBM Db2 LUW**
          in Elastic Observability. Synthetic OpenTelemetry metrics land in
          **metrics-db2receiver.otel.otel-default** (db2.connection.active, db2.bufferpool.hit_ratio,
          db2.log.utilization, db2.lock.wait_time.avg, db2.tablespace.used, db2.deadlock.count).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to watch first on a Db2 health dashboard (3–5 bullets).
          2. Early warning thresholds tied to the metrics above.
          3. When to escalate (log utilization, lock waits, buffer pool hit ratio).
          4. One paragraph on OpenTelemetry + Elastic vs JDBC/Logstash-only collection for older Db2.

          Keep advice generic; do not invent customer host names.

  - name: index_db2
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: db2
        recommendation: "{{ steps.agent_db2.output.response.message }}"

  - name: agent_oracle
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        input: |
          You are a senior database reliability engineer. The customer monitors **Oracle**
          in Elastic Observability. Metrics land in **metrics-oracledbreceiver.otel.otel-default**
          (oracledb.sessions.current, session.type, oracledb.tablespace.*, oracledb.physical_reads,
          oracledb.logical_reads, oracledb.hard_parses, oracledb.parse_calls, oracledb.pga_memory).

          Produce **concise, actionable improvement recommendations** (markdown, max ~35 lines):
          1. What to watch first on an Oracle performance dashboard (3–5 bullets).
          2. Patterns for sessions, tablespace, parse pressure, and PGA.
          3. When to escalate.
          4. One short paragraph on OTel + Elastic vs OEM-only approaches.

          Keep advice generic; do not invent customer host names.

  - name: index_oracle
    type: elasticsearch.request
    with:
      method: POST
      path: /db-monitoring-recommendations/_doc
      body:
        "@timestamp": "{{ now | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        execution_id: "{{ execution.id }}"
        workflow_name: "{{ workflow.name }}"
        source: workflow_ai_recommendations
        database_platform: oracle
        recommendation: "{{ steps.agent_oracle.output.response.message }}"

  # Refresh library Markdown (dashboard panels reference these saved objects by ref_id).
  - name: publish_markdown_mysql
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-mysql?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — mysql"
          description: ""
          content: "{{ steps.agent_mysql.output.response.message }}"

  - name: publish_markdown_postgresql
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-postgresql?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — postgresql"
          description: ""
          content: "{{ steps.agent_postgresql.output.response.message }}"

  - name: publish_markdown_sqlserver
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-sqlserver?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — sqlserver"
          description: ""
          content: "{{ steps.agent_sqlserver.output.response.message }}"

  - name: publish_markdown_mongodb
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-mongodb?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — mongodb"
          description: ""
          content: "{{ steps.agent_mongodb.output.response.message }}"

  - name: publish_markdown_db2
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-db2?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — db2"
          description: ""
          content: "{{ steps.agent_db2.output.response.message }}"

  - name: publish_markdown_oracle
    type: kibana.request
    with:
      method: POST
      path: /api/saved_objects/markdown/dbmon-ai-rec-oracle?overwrite=true
      headers:
        kbn-xsrf: "true"
      body:
        attributes:
          title: "AI recommendations — oracle"
          description: ""
          content: "{{ steps.agent_oracle.output.response.message }}"

  - name: workflow-done
    type: console
    with:
      message: |
        Indexed six recommendations (mysql, postgresql, sqlserver, mongodb, db2, oracle)
        and refreshed the **dbmon-ai-rec-*** library Markdown objects used by the dashboards.
        Open a database monitoring dashboard — **AI recommendations** should show formatted Markdown after a refresh.
